name: CI — Lint, Type Check & Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install all workspace dependencies
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check backend/ ingestion/ evaluation/

      - name: Black format check
        run: uv run black --check backend/ ingestion/ evaluation/

      - name: Mypy type check (backend)
        run: uv run mypy backend/app --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        env:
          OPENAI_API_KEY: "sk-test-dummy"
          DATABASE_URL: "postgresql+asyncpg://raguser:ragpass@localhost:5432/ragdb"
          REDIS_URL: "redis://localhost:6379/0"
          QDRANT_HOST: "localhost"
          ELASTICSEARCH_URL: "http://localhost:9200"
        run: |
          uv run pytest backend/tests/ ingestion/tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: pytest-results.xml
